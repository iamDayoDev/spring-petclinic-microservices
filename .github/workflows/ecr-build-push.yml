name: Build, Scan, Push (reusable)

on:
  workflow_call:
    inputs:
      service:
        description: "Service name matching the Maven module suffix and ECR repo name"
        required: true
        type: string
      sha:
        description: "7-character commit SHA used as the Docker image tag"
        required: true
        type: string
   

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: ${{ inputs.service }}
    runs-on: ubuntu-latest

    env:
      MAVEN_MODULE: spring-petclinic-${{ inputs.service }}
      SOURCE_IMAGE: springcommunity/spring-petclinic-${{ inputs.service }}
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID }}

    steps:
      - name: Checkout application repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve target image
        id: target-image
        shell: bash
        run: |
          registry="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          TARGET_IMAGE="${registry}/petclinic-dev-${{ inputs.service }}:${{ inputs.sha }}"

          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "target=${TARGET_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Resolved target image: ${TARGET_IMAGE}"

      - name: Build Docker image (AMD64) with Maven
        shell: bash
        run: |
          ./mvnw clean install \
            -P buildDocker \
            -Dcontainer.platform="linux/amd64" \
            -pl "${MAVEN_MODULE}" -am \
            --no-transfer-progress \
            --batch-mode

      - name: Trivy scan - CRITICAL (informational)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.SOURCE_IMAGE }}
          format: table
          output: trivy-critical-${{ inputs.service }}.txt
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL
          trivyignores: .trivyignore

      - name: Trivy scan - HIGH (informational)
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.SOURCE_IMAGE }}
          format: table
          output: trivy-high-${{ inputs.service }}.txt
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH
          trivyignores: .trivyignore

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ inputs.service }}-${{ inputs.sha }}
          path: |
            trivy-critical-${{ inputs.service }}.txt
            trivy-high-${{ inputs.service }}.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Tag image with commit SHA
        shell: bash
        run: |
          docker tag "${{ env.SOURCE_IMAGE }}" "${{ steps.target-image.outputs.target }}"
          echo "Tagged: ${{ env.SOURCE_IMAGE }} -> ${{ steps.target-image.outputs.target }}"

      - name: Push image to ECR
        shell: bash
        run: |
          docker push "${{ steps.target-image.outputs.target }}"
          echo "Pushed: ${{ steps.target-image.outputs.target }}"

      - name: Logout from ECR
        if: always()
        shell: bash
        run: |
          docker logout "${{ steps.target-image.outputs.registry }}"
