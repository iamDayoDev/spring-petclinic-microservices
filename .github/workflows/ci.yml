name: Build and Push to ECR

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get source code from GitHub
      - name: Checkout source
        uses: actions/checkout@v4

      # Step 2: Install Java 17 to compile Spring Boot
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      # Step 3: Connect to AWS using secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 4: Login to ECR so we can push images
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Step 5: Build all 8 Docker images using Maven
      - name: Build Docker images with Maven
        run: ./mvnw clean install -P buildDocker -Dmaven.test.skip=true

      # Step 6: Tag each image with git SHA and push to ECR
      - name: Tag and push images to ECR
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          SERVICES=(
            config-server
            discovery-server
            api-gateway
            customers-service
            vets-service
            visits-service
            admin-server
            genai-service
          )
          for SERVICE in "${SERVICES[@]}"; do
            LOCAL_IMAGE="springcommunity/spring-petclinic-${SERVICE}:latest"
            REMOTE_IMAGE="${ECR_REGISTRY}/${SERVICE}:${GIT_SHA}"
            echo "Pushing ${REMOTE_IMAGE}"
            docker tag  "${LOCAL_IMAGE}" "${REMOTE_IMAGE}"
            docker push "${REMOTE_IMAGE}"
          done

      # Step 7: Clone platform repo
      - name: Clone petclinic-platform
        env:
          GH_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone https://x-access-token:${GH_PERSONAL_ACCESS_TOKEN}@github.com/Achievers11-DevOps/petclinic-microservices.git \
            /tmp/petclinic-platform

      # Step 8: Update image tag in values.yaml
      - name: Update image tag in values.yaml
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          VALUES=/tmp/petclinic-platform/helm/petclinic/values.yaml
          sed -i "s/^  tag: .*/  tag: ${GIT_SHA}/" "${VALUES}"
          echo "Updated tag to ${GIT_SHA}:"
          grep "tag:" "${VALUES}"

      # Step 9: Push tag update to platform repo - ArgoCD will auto-deploy!
      - name: Commit and push tag update
        env:
          GIT_SHA: ${{ github.sha }}
          GH_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd /tmp/petclinic-platform
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/petclinic/values.yaml
          git commit -m "chore: deploy ${GIT_SHA::7} [skip ci]"
          git push https://x-access-token:${GH_PERSONAL_ACCESS_TOKEN}@github.com/Achievers11-DevOps/petclinic-microservices.git main
