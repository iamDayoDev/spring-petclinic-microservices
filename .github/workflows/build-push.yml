# Trigger to deploy
name: Build and Push Docker Images

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]


permissions:
  id-token: write
  contents: read

jobs:
  detect-service-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has-changes: ${{ steps.build-matrix.outputs.has-changes }}
      services: ${{ steps.build-matrix.outputs.services }}
      sha: ${{ steps.build-matrix.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'pom.xml'
              - 'mvnw'
              - 'mvnw.cmd'
              - '.mvn/**'
              - 'docker/**'
              - '.trivyignore'
            config-server:
              - 'spring-petclinic-config-server/**'
            discovery-server:
              - 'spring-petclinic-discovery-server/**'
            api-gateway:
              - 'spring-petclinic-api-gateway/**'
            customers-service:
              - 'spring-petclinic-customers-service/**'
            visits-service:
              - 'spring-petclinic-visits-service/**'
            vets-service:
              - 'spring-petclinic-vets-service/**'
            genai-service:
              - 'spring-petclinic-genai-service/**'
            admin-server:
              - 'spring-petclinic-admin-server/**'

      - name: Build service matrix
        id: build-matrix
        shell: bash
        run: |
          ALL_SERVICES=(
            config-server
            discovery-server
            api-gateway
            customers-service
            visits-service
            vets-service
            genai-service
            admin-server
          )

          services=()
          if [ "${{ steps.filter.outputs.shared }}" = "true" ]; then
            services=("${ALL_SERVICES[@]}")
          else
            [ "${{ steps.filter.outputs.config-server }}" = "true" ] && services+=("config-server")
            [ "${{ steps.filter.outputs.discovery-server }}" = "true" ] && services+=("discovery-server")
            [ "${{ steps.filter.outputs.api-gateway }}" = "true" ] && services+=("api-gateway")
            [ "${{ steps.filter.outputs.customers-service }}" = "true" ] && services+=("customers-service")
            [ "${{ steps.filter.outputs.visits-service }}" = "true" ] && services+=("visits-service")
            [ "${{ steps.filter.outputs.vets-service }}" = "true" ] && services+=("vets-service")
            [ "${{ steps.filter.outputs.genai-service }}" = "true" ] && services+=("genai-service")
            [ "${{ steps.filter.outputs.admin-server }}" = "true" ] && services+=("admin-server")
          fi

          SHA="${GITHUB_SHA::7}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

          if [ ${#services[@]} -eq 0 ]; then
            echo "No buildable service changes detected."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "services=" >> "$GITHUB_OUTPUT"
          else
            MATRIX=$(printf '"%s"\n' "${services[@]}" | jq -sc .)
            echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            echo "services=${services[*]}" >> "$GITHUB_OUTPUT"
            echo "Changed services (${#services[@]}): ${services[*]}"
          fi

  build:
    name: Build ${{ matrix.service }}
    needs: detect-service-changes
    if: needs.detect-service-changes.outputs.has-changes == 'true'
    strategy:
      matrix:
        service: ${{ fromJSON(needs.detect-service-changes.outputs.matrix) }}
      fail-fast: false
    uses: ./.github/workflows/ecr-build-push.yml
    with:
      service: ${{ matrix.service }}
      sha: ${{ needs.detect-service-changes.outputs.sha }}
    secrets: inherit

  notify:
    name: Notify Platform Repo
    needs: [detect-service-changes, build]
    if: |
      always() &&
      needs.detect-service-changes.outputs.has-changes == 'true' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch app-image-built to platform repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_REPO_TOKEN || secrets.GH_PAT }}
          repository: ${{ vars.PLATFORM_REPO }}
          event-type: app-image-built
          client-payload: |
            {
              "sha": "${{ needs.detect-service-changes.outputs.sha }}",
              "services": "${{ needs.detect-service-changes.outputs.services }}",
              "source_repository": "${{ github.repository }}"
            }
